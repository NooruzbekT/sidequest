[tool.pytest.ini_options]
pythonpath = ["backend", "ml"]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: тесты с реальной БД (docker compose или сервисы CI)",
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["app", "metrics", "models"]

[tool.ruff.lint.per-file-ignores]
# Depends в дефолтах — базовая идиома FastAPI
"backend/app/routers/*" = ["B008"]
# автогенерированные миграции не переносим вручную
"backend/migrations/versions/*" = ["E501"]
