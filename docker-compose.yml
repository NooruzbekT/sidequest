services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidequest}
      POSTGRES_DB: ${POSTGRES_DB:-sidequest}
    ports:
      # 5433 снаружи: локальная служба PostgreSQL на Windows занимает 5432;
      # привязка к 127.0.0.1 — база не светится в сеть
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidequest}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment: &backend_env
      POSTGRES_USER: ${POSTGRES_USER:-sidequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidequest}
      POSTGRES_DB: ${POSTGRES_DB:-sidequest}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      RQ_REDIS_URL: redis://redis:6379/0
      MODEL_ARTIFACT_PATH: /srv/ml/artifacts/hybrid_current.json
      ML_DIR: /srv/ml
      DATA_DIR: /srv/data
    volumes:
      - ./ml:/srv/ml:ro
      - ./data:/srv/data:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: rq worker sidequest
    environment: *backend_env
    volumes:
      # worker пишет артефакт при переобучении — ml монтируется на запись
      - ./ml:/srv/ml
      - ./data:/srv/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
