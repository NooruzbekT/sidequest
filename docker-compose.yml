services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidequest}
      POSTGRES_DB: ${POSTGRES_DB:-sidequest}
    ports:
      # 5433 снаружи: локальная служба PostgreSQL на Windows занимает 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidequest}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidequest}
      POSTGRES_DB: ${POSTGRES_DB:-sidequest}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MODEL_ARTIFACT_PATH: /srv/artifacts/hybrid_v2.json
    volumes:
      - ./ml/artifacts:/srv/artifacts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
